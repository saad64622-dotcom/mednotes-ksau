<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedNotes – KSAU Medicine</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg: #080b10;
  --surface: #0f1318;
  --surface2: #161b23;
  --surface3: #1d242f;
  --border: rgba(255,255,255,0.07);
  --accent: #3ecf8e;
  --accent2: #f5a623;
  --accent3: #e05c5c;
  --text: #e8eaf0;
  --muted: #5a6374;
  --gold: #c9a84c;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(62,207,142,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(62,207,142,0.025) 1px,transparent 1px);background-size:52px 52px;pointer-events:none;z-index:0;}

/* HEADER */
header{position:sticky;top:0;z-index:200;background:rgba(8,11,16,0.9);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);padding:0 24px;height:62px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-family:'Playfair Display',serif;font-size:21px;font-weight:900;letter-spacing:-0.5px;cursor:pointer;}
.logo span{color:var(--accent);}
.header-right{display:flex;align-items:center;gap:12px;}
.badge{font-family:'DM Mono',monospace;font-size:10px;padding:4px 10px;border-radius:20px;border:1px solid var(--gold);color:var(--gold);letter-spacing:1px;}
.admin-btn{font-size:12px;padding:6px 14px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all 0.2s;font-family:'DM Sans',sans-serif;}
.admin-btn:hover{border-color:var(--accent3);color:var(--accent3);}

/* NAV TABS */
.nav{display:flex;gap:2px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:4px;margin-bottom:28px;}
.nav-tab{flex:1;padding:9px 6px;border:none;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;border-radius:9px;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
.nav-tab.active{background:var(--surface2);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,0.5);}

/* MAIN */
main{position:relative;z-index:1;max-width:1140px;margin:0 auto;padding:36px 24px 80px;}

/* HERO */
.hero{text-align:center;margin-bottom:44px;animation:fadeUp 0.5s ease both;}
.hero h1{font-family:'Playfair Display',serif;font-size:clamp(28px,4.5vw,48px);font-weight:900;line-height:1.1;margin-bottom:10px;}
.hero h1 em{color:var(--accent);font-style:normal;}
.hero p{color:var(--muted);font-size:14px;max-width:440px;margin:0 auto;}

/* PANEL */
.panel{display:none;animation:fadeUp 0.35s ease both;}
.panel.active{display:block;}

/* SEARCH ROW */
.search-row{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
.search-wrap{position:relative;flex:1;min-width:200px;}
.search-wrap input{padding-left:38px;width:100%;}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:15px;pointer-events:none;}

/* BLOCK FILTER PILLS */
.block-filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
.block-pill{padding:7px 16px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;transition:all 0.15s;letter-spacing:0.3px;}
.block-pill.active{background:rgba(62,207,142,0.1);border-color:var(--accent);color:var(--accent);}
.block-pill .dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:6px;vertical-align:middle;}

/* SUBJECT FILTERS */
.subject-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px;padding:14px;background:var(--surface);border:1px solid var(--border);border-radius:12px;}
.subj-pill{padding:5px 12px;border-radius:14px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;cursor:pointer;transition:all 0.15s;}
.subj-pill.active{background:rgba(245,166,35,0.1);border-color:var(--accent2);color:var(--accent2);}

/* LECTURE GRID */
.lecture-grid{display:grid;gap:14px;}
.lec-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 20px;cursor:pointer;transition:border-color 0.2s,transform 0.15s;position:relative;overflow:hidden;}
.lec-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px;opacity:0;transition:opacity 0.2s;}
.lec-card:hover{transform:translateY(-2px);}
.lec-card:hover::before{opacity:1;}
.lec-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:12px;}
.lec-title{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;line-height:1.3;}
.lec-meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:6px;}
.meta-pill{font-size:10px;font-family:'DM Mono',monospace;padding:3px 8px;border-radius:8px;background:var(--surface2);color:var(--muted);}
.meta-pill.block{font-weight:600;}
.stars-display{display:flex;align-items:center;gap:3px;flex-shrink:0;}
.stars-display .avg{font-weight:700;font-size:14px;color:var(--accent2);margin-left:2px;}
.stars-display .cnt{font-size:11px;color:var(--muted);}
.lec-tip{font-size:12px;color:var(--muted);line-height:1.5;margin-top:7px;border-top:1px solid var(--border);padding-top:7px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

/* FORM */
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:26px;margin-bottom:22px;}
.card h2{font-family:'Playfair Display',serif;font-size:19px;font-weight:700;margin-bottom:18px;display:flex;align-items:center;gap:9px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media(max-width:580px){.form-grid{grid-template-columns:1fr;}}
.field{display:flex;flex-direction:column;gap:5px;}
.field.full{grid-column:1/-1;}
label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;}
input,select,textarea{background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:10px 13px;outline:none;transition:border-color 0.2s;width:100%;}
input:focus,select:focus,textarea:focus{border-color:var(--accent);}
select option{background:var(--surface2);}
textarea{resize:vertical;min-height:85px;}
.star-group{display:flex;gap:5px;align-items:center;}
.star{font-size:24px;cursor:pointer;transition:transform 0.15s;filter:grayscale(1) brightness(0.35);user-select:none;}
.star.lit{filter:none;transform:scale(1.1);}
.star:hover{transform:scale(1.2);}
.star-lbl{margin-left:8px;font-size:12px;color:var(--muted);}
.tag-group{display:flex;flex-wrap:wrap;gap:7px;}
.tag{padding:5px 13px;border-radius:18px;border:1px solid var(--border);font-size:12px;cursor:pointer;transition:all 0.15s;background:transparent;color:var(--muted);}
.tag.selected{border-color:var(--accent);color:var(--accent);background:rgba(62,207,142,0.08);}
.btn-submit{width:100%;margin-top:18px;padding:13px;background:var(--accent);color:#080b10;border:none;border-radius:11px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:opacity 0.2s,transform 0.15s;}
.btn-submit:hover{opacity:0.9;transform:translateY(-1px);}
.btn-submit:disabled{opacity:0.4;cursor:not-allowed;transform:none;}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:28px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;text-align:center;}
.stat-card .num{font-family:'Playfair Display',serif;font-size:34px;font-weight:900;color:var(--accent);line-height:1;margin-bottom:4px;}
.stat-card .lbl{font-size:12px;color:var(--muted);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.8);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity 0.25s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;width:100%;max-width:600px;max-height:88vh;overflow-y:auto;padding:26px;transform:translateY(18px);transition:transform 0.25s;}
.modal-overlay.open .modal{transform:translateY(0);}
.modal-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;}
.modal-header h2{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;line-height:1.25;max-width:82%;}
.close-btn{background:var(--surface2);border:1px solid var(--border);color:var(--muted);width:34px;height:34px;border-radius:50%;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:color 0.2s;}
.close-btn:hover{color:var(--text);}
.modal-ratings{display:flex;gap:16px;flex-wrap:wrap;padding:14px;border-radius:11px;background:var(--surface2);margin-bottom:18px;}
.rating-block{text-align:center;}
.rating-block .big{font-size:22px;font-weight:700;}
.rating-block .lbl{font-size:10px;color:var(--muted);margin-top:2px;}
.review-item{background:var(--bg);border-radius:10px;padding:13px 15px;margin-bottom:9px;border:1px solid var(--border);}
.review-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;}
.reviewer-name{font-size:13px;font-weight:600;color:var(--accent);}
.review-stars{font-size:12px;}
.review-tip{font-size:13px;line-height:1.6;}
.review-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px;}
.review-tag{font-size:10px;padding:2px 8px;border-radius:8px;background:rgba(62,207,142,0.09);color:var(--accent);border:1px solid rgba(62,207,142,0.18);}
.review-date{font-size:10px;color:var(--muted);margin-top:4px;}

/* ADMIN */
.admin-overlay{position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,0.9);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity 0.25s;}
.admin-overlay.open{opacity:1;pointer-events:all;}
.admin-panel{background:var(--surface);border:1px solid var(--border);border-radius:20px;width:100%;max-width:780px;max-height:90vh;overflow-y:auto;padding:28px;transform:translateY(20px);transition:transform 0.25s;}
.admin-overlay.open .admin-panel{transform:translateY(0);}
.admin-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;}
.admin-top h2{font-family:'Playfair Display',serif;font-size:22px;font-weight:900;}
.admin-top h2 span{color:var(--accent3);}
.admin-search{display:flex;gap:10px;margin-bottom:18px;}
.admin-search input{flex:1;}
.review-row{background:var(--bg);border:1px solid var(--border);border-radius:11px;padding:14px 16px;margin-bottom:10px;display:flex;gap:14px;align-items:flex-start;}
.review-row-info{flex:1;}
.review-row-title{font-weight:600;font-size:14px;margin-bottom:3px;}
.review-row-meta{font-size:11px;color:var(--muted);margin-bottom:5px;}
.review-row-tip{font-size:12px;color:var(--text);line-height:1.5;}
.review-row-actions{display:flex;flex-direction:column;gap:7px;flex-shrink:0;}
.btn-delete{padding:6px 14px;border-radius:8px;border:1px solid rgba(224,92,92,0.4);background:rgba(224,92,92,0.08);color:var(--accent3);font-size:12px;font-weight:600;cursor:pointer;transition:all 0.15s;font-family:'DM Sans',sans-serif;}
.btn-delete:hover{background:rgba(224,92,92,0.18);}
.btn-edit-save{padding:6px 14px;border-radius:8px;border:1px solid rgba(62,207,142,0.4);background:rgba(62,207,142,0.08);color:var(--accent);font-size:12px;font-weight:600;cursor:pointer;transition:all 0.15s;font-family:'DM Sans',sans-serif;}
.btn-edit-save:hover{background:rgba(62,207,142,0.18);}

/* LOGIN */
.login-box{max-width:380px;margin:0 auto;padding:40px 20px;text-align:center;}
.login-box h2{font-family:'Playfair Display',serif;font-size:26px;font-weight:900;margin-bottom:6px;}
.login-box p{color:var(--muted);font-size:13px;margin-bottom:24px;}
.login-box input{margin-bottom:12px;}
.login-box .btn-submit{margin-top:0;}
.login-error{color:var(--accent3);font-size:12px;margin-top:8px;}

/* MISC */
.empty-state{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-state .big{font-size:44px;margin-bottom:10px;}
.spinner{width:18px;height:18px;border:2px solid rgba(62,207,142,0.3);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block;vertical-align:middle;}
.spinner-lg{width:34px;height:34px;border-width:3px;}
.loading-screen{text-align:center;padding:70px 20px;color:var(--muted);}
.diff-bar{height:5px;border-radius:3px;flex:1;background:var(--surface2);overflow:hidden;}
.diff-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--accent);color:#080b10;padding:11px 22px;border-radius:28px;font-weight:700;font-size:13px;transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1);z-index:9999;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.error{background:var(--accent3);color:#fff;}
.section-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
@keyframes spin{to{transform:rotate(360deg);}}

/* Block colors */
.block-cardio    {--bc:#e05c5c;}
.block-msk       {--bc:#3ecf8e;}
.block-neuro     {--bc:#a78bfa;}
.block-resp      {--bc:#38bdf8;}
.block-gi        {--bc:#fb923c;}
.block-renal     {--bc:#f472b6;}
.block-endo      {--bc:#facc15;}
.block-hemato    {--bc:#34d399;}
.block-repro     {--bc:#f9a8d4;}
.block-immuno    {--bc:#60a5fa;}
.block-other     {--bc:#94a3b8;}

.lec-card.block-cardio{border-left:3px solid var(--bc);}
.lec-card.block-msk   {border-left:3px solid var(--bc);}
.lec-card.block-neuro {border-left:3px solid var(--bc);}
.lec-card.block-resp  {border-left:3px solid var(--bc);}
.lec-card.block-gi    {border-left:3px solid var(--bc);}
.lec-card.block-renal {border-left:3px solid var(--bc);}
.lec-card.block-endo  {border-left:3px solid var(--bc);}
.lec-card.block-hemato{border-left:3px solid var(--bc);}
.lec-card.block-repro {border-left:3px solid var(--bc);}
.lec-card.block-immuno{border-left:3px solid var(--bc);}
.lec-card.block-other {border-left:3px solid var(--bc);}

.lec-card:hover{border-color:rgba(255,255,255,0.12);}
.meta-pill.block{color:var(--bc) !important;}
.block-dot{width:8px;height:8px;border-radius:50%;background:var(--bc);display:inline-block;margin-right:6px;vertical-align:middle;}
</style>
</head>
<body>

<header>
  <div class="logo" onclick="switchTab('browse')">Med<span>Notes</span></div>
  <div class="header-right">
    <div class="badge">KSAU · MEDICINE</div>
    <button class="admin-btn" onclick="openAdmin()">⚙️ Admin</button>
  </div>
</header>

<main>
  <div class="hero">
    <h1>Rate your lectures.<br><em>Help your crew.</em></h1>
    <p>Honest ratings and tips for every lecture — organized by block and subject.</p>
  </div>

  <div class="nav">
    <button class="nav-tab active" onclick="switchTab('browse')">📚 Browse</button>
    <button class="nav-tab" onclick="switchTab('submit')">✍️ Submit</button>
    <button class="nav-tab" onclick="switchTab('stats')">📊 Stats</button>
  </div>

  <!-- BROWSE -->
  <div class="panel active" id="panel-browse">
    <div class="search-row">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Search lectures…" oninput="renderLectures()">
      </div>
    </div>

    <div class="section-label">Filter by Branch</div>
    <div class="block-filters" id="branchFilters" style="margin-bottom:18px"></div>

    <div class="section-label">Filter by Block</div>
    <div class="block-filters" id="blockFilters"></div>

    <div class="subject-filters" id="subjectFilters" style="display:none"></div>

    <div class="lecture-grid" id="lectureGrid">
      <div class="loading-screen"><div class="spinner spinner-lg" style="margin-bottom:14px"></div><p>Loading…</p></div>
    </div>
  </div>

  <!-- SUBMIT -->
  <div class="panel" id="panel-submit">
    <div class="card">
      <h2>📝 Add a Lecture Review</h2>
      <div class="form-grid">
        <div class="field">
          <label>Your Name / Nickname</label>
          <input type="text" id="reviewer" placeholder="e.g. Turki, Anonymouse…">
        </div>
        <div class="field">
          <label>Branch</label>
          <select id="branch">
            <option value="">— Select branch —</option>
            <option value="Riyadh">🏙️ Riyadh</option>
            <option value="Jeddah">🌊 Jeddah</option>
          </select>
        </div>
        <div class="field">
          <label>Block (Main Category)</label>
          <select id="block" onchange="updateSubjects()">
            <option value="">— Select block —</option>
            <option value="Cardiology">❤️ Cardiology</option>
            <option value="Musculoskeletal">🦴 Musculoskeletal</option>
            <option value="Neurology">🧠 Neurology</option>
            <option value="Respiratory">🫁 Respiratory</option>
            <option value="Gastrointestinal">🫀 Gastrointestinal</option>
            <option value="Renal">💧 Renal</option>
            <option value="Endocrine">⚗️ Endocrine</option>
            <option value="Hematology">🩸 Hematology</option>
            <option value="Reproductive">🔬 Reproductive</option>
            <option value="Immunology">🛡️ Immunology</option>
            <option value="Other">📦 Other</option>
          </select>
        </div>
        <div class="field">
          <label>Subject (Sub-category)</label>
          <select id="subject">
            <option value="">— Select block first —</option>
          </select>
        </div>
        <div class="field">
          <label>Lecture Title</label>
          <input type="text" id="lectureTitle" placeholder="e.g. Brachial Plexus – Dr. Ahmed">
        </div>
        <div class="field full">
          <label>Overall Rating</label>
          <div class="star-group" id="overallStars">
            <span class="star" data-val="1">⭐</span><span class="star" data-val="2">⭐</span><span class="star" data-val="3">⭐</span><span class="star" data-val="4">⭐</span><span class="star" data-val="5">⭐</span>
            <span class="star-lbl" id="overallLabel">Tap to rate</span>
          </div>
        </div>
        <div class="field full">
          <label>Difficulty Level</label>
          <div class="star-group" id="diffStars">
            <span class="star" data-val="1">🔥</span><span class="star" data-val="2">🔥</span><span class="star" data-val="3">🔥</span><span class="star" data-val="4">🔥</span><span class="star" data-val="5">🔥</span>
            <span class="star-lbl" id="diffLabel">Tap to rate</span>
          </div>
        </div>
        <div class="field full">
          <label>Tags</label>
          <div class="tag-group" id="tagGroup">
            <button type="button" class="tag" data-tag="High-yield">🎯 High-yield</button>
            <button type="button" class="tag" data-tag="Read slides only">📑 Slides only</button>
            <button type="button" class="tag" data-tag="Must attend">🏛 Must attend</button>
            <button type="button" class="tag" data-tag="Recording is enough">🎥 Recording ok</button>
            <button type="button" class="tag" data-tag="Memorization heavy">🧠 Memorization</button>
            <button type="button" class="tag" data-tag="Concept-based">💡 Concept-based</button>
            <button type="button" class="tag" data-tag="Clinical relevance">🏥 Clinical</button>
            <button type="button" class="tag" data-tag="Confusing">😵 Confusing</button>
            <button type="button" class="tag" data-tag="Short lecture">⚡ Short</button>
          </div>
        </div>
        <div class="field full">
          <label>Tips for Friends</label>
          <textarea id="tipText" placeholder="What should they focus on? What will come in the exam? Any study tricks?"></textarea>
        </div>
      </div>
      <button class="btn-submit" id="submitBtn" onclick="submitReview()">Submit Review →</button>
    </div>
  </div>

  <!-- STATS -->
  <div class="panel" id="panel-stats">
    <div class="stats-grid" id="statsGrid"><div class="loading-screen"><div class="spinner spinner-lg"></div></div></div>
    <div id="statsCharts"></div>
  </div>
</main>

<!-- LECTURE MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle"></h2>
      <button class="close-btn" onclick="closeModalDirect()">✕</button>
    </div>
    <div id="modalBody"></div>
  </div>

// ── STATE ──
let allReviews = [];

async function fetchReviews() {
  const { data, error } = await sb.from('reviews').select('*').order('created_at', { ascending: false });
  if (error) { showToast('⚠️ Could not connect to database', true); return; }
  allReviews = data || [];
  renderLectures();
}

// ── BRANCH FILTERS ──
function renderBranchFilters() {
  const branches = ['All', 'Riyadh', 'Jeddah'];
  const icons = { All: '🌍', Riyadh: '🏙️', Jeddah: '🌊' };
  document.getElementById('branchFilters').innerHTML = branches.map(b =>
    `<button class="block-pill ${b === activeBranch ? 'active' : ''}" style="${b===activeBranch?'border-color:#c9a84c;color:#c9a84c;background:rgba(201,168,76,0.1)':''}" onclick="setBranchFilter('${b}')">${icons[b]} ${b}</button>`
  ).join('');
}

function setBranchFilter(branch) {
  activeBranch = branch;
  activeBlock = 'All';
  activeSubject = 'All';
  renderBranchFilters();
  renderBlockFilters();
  renderSubjectFilters();
  renderLectures();
}

// ── SUBJECT DROPDOWN (form) ──
function updateSubjects() {
  const block = document.getElementById('block').value;
  const sel = document.getElementById('subject');
  sel.innerHTML = '<option value="">— Select subject —</option>';
  if (block && BLOCKS[block]) {
    BLOCKS[block].subjects.forEach(s => {
      const o = document.createElement('option');
      o.value = s; o.textContent = s;
      sel.appendChild(o);
    });
  }
}

// ── BLOCK FILTERS ──
function renderBlockFilters() {
  const blocks = ['All', ...Object.keys(BLOCKS)];
  document.getElementById('blockFilters').innerHTML = blocks.map(b => {
    const info = BLOCKS[b];
    const dot = info ? `<span class="dot" style="background:var(--${info.cls.replace('block-','bc-') || 'bc'}); background:${getBlockColor(b)}"></span>` : '';
    return `<button class="block-pill ${b === activeBlock ? 'active' : ''}" onclick="setBlockFilter('${b}')">${info ? info.emoji + ' ' : ''}${b}</button>`;
  }).join('');
}

function getBlockColor(block) {
  const map = { Cardiology:'#e05c5c', Musculoskeletal:'#3ecf8e', Neurology:'#a78bfa', Respiratory:'#38bdf8', Gastrointestinal:'#fb923c', Renal:'#f472b6', Endocrine:'#facc15', Hematology:'#34d399', Reproductive:'#f9a8d4', Immunology:'#60a5fa', Other:'#94a3b8' };
  return map[block] || '#3ecf8e';
}

function setBlockFilter(block) {
  activeBlock = block;
  activeSubject = 'All';
  renderBlockFilters();
  renderSubjectFilters();
  renderLectures();
}

function renderSubjectFilters() {
  const el = document.getElementById('subjectFilters');
  if (activeBlock === 'All' || !BLOCKS[activeBlock]) { el.style.display = 'none'; return; }
  
  const usedSubjects = [...new Set(allReviews.filter(r => r.block === activeBlock && (activeBranch === 'All' || r.branch === activeBranch)).map(r => r.subject))];
  if (!usedSubjects.length) { el.style.display = 'none'; return; }

  el.style.display = 'flex';
  el.innerHTML = ['All', ...usedSubjects].map(s =>
    `<button class="subj-pill ${s === activeSubject ? 'active' : ''}" onclick="setSubjectFilter('${s}')">${s}</button>`
  ).join('');
}

function setSubjectFilter(subject) {
  activeSubject = subject;
  renderSubjectFilters();
  renderLectures();
}

// ── GROUP ──
function groupedLectures() {
  const map = {};
  allReviews.forEach(r => {
    const key = `${r.branch}||${r.block}||${r.subject}||${r.lecture_title}`;
    if (!map[key]) map[key] = { branch: r.branch, block: r.block, subject: r.subject, title: r.lecture_title, reviews: [] };
    map[key].reviews.push(r);
  });
  return Object.values(map);
}

function avg(lec, field) {
  if (!lec.reviews.length) return 0;
  return lec.reviews.reduce((s,r) => s + r[field], 0) / lec.reviews.length;
}

// ── RENDER ──
function renderLectures() {
  const query = (document.getElementById('searchInput')?.value || '').toLowerCase();
  const lectures = groupedLectures();
  renderSubjectFilters();

  let filtered = lectures.filter(l => {
    const matchQuery   = l.title.toLowerCase().includes(query) || l.subject.toLowerCase().includes(query) || (l.block||'').toLowerCase().includes(query);
    const matchBranch  = activeBranch === 'All' || l.branch === activeBranch;
    const matchBlock   = activeBlock === 'All' || l.block === activeBlock;
    const matchSubject = activeSubject === 'All' || l.subject === activeSubject;
    return matchQuery && matchBranch && matchBlock && matchSubject;
  }).sort((a,b) => avg(b,'overall') - avg(a,'overall'));

  const grid = document.getElementById('lectureGrid');
  if (!filtered.length) {
    grid.innerHTML = `<div class="empty-state"><div class="big">📖</div><p>${query ? 'No results found.' : 'No reviews yet — be the first!'}</p></div>`;
    return;
  }

  grid.innerHTML = filtered.map((l, idx) => {
    const blockInfo = BLOCKS[l.block] || BLOCKS['Other'];
    const cls = blockInfo.cls;
    const color = getBlockColor(l.block);
    const avgO = avg(l,'overall').toFixed(1);
    const avgD = avg(l,'difficulty').toFixed(1);
    const count = l.reviews.length;
    const lastTip = l.reviews[0]?.tip || '';
    const branchIcon = l.branch === 'Riyadh' ? '🏙️' : l.branch === 'Jeddah' ? '🌊' : '';
    return `
      <div class="lec-card ${cls}" onclick="openModal(${idx})">
        <div class="lec-header">
          <div class="lec-title">${l.title}</div>
          <div class="stars-display">⭐<span class="avg">${avgO}</span><span class="cnt">(${count})</span></div>
        </div>
        <div class="lec-meta">
          <span class="meta-pill block" style="color:${color}!important">${blockInfo.emoji} ${l.block}</span>
          <span class="meta-pill">${l.subject}</span>
          ${l.branch ? `<span class="meta-pill">${branchIcon} ${l.branch}</span>` : ''}
          <span class="meta-pill">🔥 ${avgD}</span>
          <span class="meta-pill">${count} review${count>1?'s':''}</span>
        </div>
        ${lastTip ? `<div class="lec-tip">💡 ${lastTip}</div>` : ''}
      </div>`;
  }).join('');

  // store filtered list for modal lookup
  window._filteredLectures = filtered;
}

// ── MODAL ──
function openModal(idx) {
  const lec = (window._filteredLectures || [])[idx];
  if (!lec) return;

  const avgO = avg(lec,'overall').toFixed(1);
  const avgD = avg(lec,'difficulty').toFixed(1);
  const blockInfo = BLOCKS[lec.block] || BLOCKS['Other'];

  const tagFreq = {};
  lec.reviews.forEach(r => (r.tags||[]).forEach(t => tagFreq[t] = (tagFreq[t]||0)+1));
  const topTags = Object.entries(tagFreq).sort((a,b)=>b[1]-a[1]).slice(0,5);

  document.getElementById('modalTitle').textContent = lec.title;
  let body = `
    <div class="modal-ratings">
      <div class="rating-block"><div class="big">⭐ ${avgO}</div><div class="lbl">Overall · ${lec.reviews.length} reviews</div></div>
      <div class="rating-block"><div class="big">🔥 ${avgD}</div><div class="lbl">Difficulty</div></div>
      <div class="rating-block"><div class="big">${blockInfo.emoji}</div><div class="lbl">${lec.block}</div></div>
      <div class="rating-block"><div class="big">📚</div><div class="lbl">${lec.subject}</div></div>
      ${lec.branch ? `<div class="rating-block"><div class="big">${lec.branch==='Riyadh'?'🏙️':'🌊'}</div><div class="lbl">${lec.branch}</div></div>` : ''}
    </div>`;

  if (topTags.length) body += `<div class="review-tags" style="margin-bottom:16px">${topTags.map(([t,c])=>`<span class="review-tag">${t} ×${c}</span>`).join('')}</div>`;

  body += `<div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px">${lec.reviews.length} Review${lec.reviews.length>1?'s':''}</div>`;
  body += lec.reviews.map(r => `
    <div class="review-item">
      <div class="review-top">
        <span class="reviewer-name">${r.reviewer}</span>
        <span class="review-stars">⭐${r.overall} 🔥${r.difficulty}</span>
      </div>
      ${r.tip ? `<div class="review-tip">${r.tip}</div>` : ''}
      ${(r.tags||[]).length ? `<div class="review-tags">${r.tags.map(t=>`<span class="review-tag">${t}</span>`).join('')}</div>` : ''}
      <div class="review-date">${new Date(r.created_at).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}</div>
    </div>`).join('');

  document.getElementById('modalBody').innerHTML = body;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e) { if (e.target === document.getElementById('modalOverlay')) closeModalDirect(); }
function closeModalDirect() { document.getElementById('modalOverlay').classList.remove('open'); }

// ── TABS ──
function switchTab(tab) {
  document.querySelectorAll('.nav-tab').forEach((t,i) => t.classList.toggle('active', ['browse','submit','stats'][i] === tab));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-'+tab).classList.add('active');
  if (tab === 'browse') fetchReviews();
  if (tab === 'stats') { fetchReviews().then(renderStats); }
}

// ── STARS ──
function initStars() {
  const oL = ['Poor 😕','Fair 😐','Good 👍','Great 😄','Excellent 🌟'];
  const dL = ['Very Easy 😴','Easy 🙂','Moderate 🤔','Hard 😰','Brutal 🤯'];
  setupStars('overallStars','overallLabel',oL,v=>overallRating=v);
  setupStars('diffStars','diffLabel',dL,v=>diffRating=v);
}
function setupStars(gId, lId, labels, setter) {
  document.getElementById(gId).querySelectorAll('.star').forEach(s => {
    s.addEventListener('click', () => {
      const v = +s.dataset.val; setter(v);
      document.getElementById(gId).querySelectorAll('.star').forEach(x => x.classList.toggle('lit', +x.dataset.val <= v));
      document.getElementById(lId).textContent = labels[v-1];
    });
  });
}

// ── TAGS ──
function initTags() {
  document.getElementById('tagGroup').querySelectorAll('.tag').forEach(t => {
    t.addEventListener('click', () => {
      const tag = t.dataset.tag;
      selectedTags.includes(tag) ? (selectedTags = selectedTags.filter(x=>x!==tag), t.classList.remove('selected')) : (selectedTags.push(tag), t.classList.add('selected'));
    });
  });
}

// ── SUBMIT ──
async function submitReview() {
  const reviewer = document.getElementById('reviewer').value.trim();
  const branch   = document.getElementById('branch').value;
  const block    = document.getElementById('block').value;
  const subject  = document.getElementById('subject').value;
  const title    = document.getElementById('lectureTitle').value.trim();
  const tip      = document.getElementById('tipText').value.trim();

  if (!reviewer || !branch || !block || !subject || !title || !overallRating || !diffRating) {
    showToast('⚠️ Please fill in all fields and ratings', true); return;
  }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Saving…';

  const { error } = await sb.from('reviews').insert({ reviewer, branch, block, subject, lecture_title: title, overall: overallRating, difficulty: diffRating, tags: selectedTags, tip });
  if (error) {
    showToast('❌ Error saving. Try again.', true);
    btn.disabled = false; btn.textContent = 'Submit Review →'; return;
  }

  overallRating = 0; diffRating = 0; selectedTags = [];
  ['reviewer','lectureTitle','tipText'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('branch').value = '';
  document.getElementById('block').value = '';
  document.getElementById('subject').innerHTML = '<option value="">— Select block first —</option>';
  document.querySelectorAll('.star').forEach(s => s.classList.remove('lit'));
  document.getElementById('overallLabel').textContent = 'Tap to rate';
  document.getElementById('diffLabel').textContent = 'Tap to rate';
  document.querySelectorAll('.tag').forEach(t => t.classList.remove('selected'));
  btn.disabled = false; btn.textContent = 'Submit Review →';
  showToast('✅ Review submitted!');
  switchTab('browse');
}

// ── STATS ──
async function renderStats() {
  const lectures = groupedLectures();
  const total = allReviews.length;
  const blocks = new Set(allReviews.map(r=>r.block)).size;
  const globalAvg = total ? (allReviews.reduce((s,r)=>s+r.overall,0)/total).toFixed(1) : '—';

  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card"><div class="num">${lectures.length}</div><div class="lbl">Lectures Rated</div></div>
    <div class="stat-card"><div class="num">${total}</div><div class="lbl">Total Reviews</div></div>
    <div class="stat-card"><div class="num">${blocks}</div><div class="lbl">Blocks Covered</div></div>
    <div class="stat-card"><div class="num">${globalAvg}</div><div class="lbl">Avg Rating ⭐</div></div>
  `;

  if (!lectures.length) { document.getElementById('statsCharts').innerHTML = ''; return; }

  const sorted  = [...lectures].sort((a,b)=>avg(b,'overall')-avg(a,'overall'));
  const hardest = [...lectures].sort((a,b)=>avg(b,'difficulty')-avg(a,'difficulty'));

  document.getElementById('statsCharts').innerHTML = `
    <div class="card" style="margin-bottom:18px">
      <h2>🏆 Top Rated</h2>
      ${sorted.slice(0,5).map((l,i)=>{
        const bi = BLOCKS[l.block]||BLOCKS['Other'];
        return `<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)">
          <span style="font-family:'Playfair Display',serif;font-size:20px;font-weight:900;color:var(--accent);width:26px">${i+1}</span>
          <div style="flex:1">
            <div style="font-weight:600;font-size:13px">${l.title}</div>
            <div style="font-size:11px;color:var(--muted)">${bi.emoji} ${l.block} · ${l.subject}</div>
          </div>
          <span style="color:var(--accent2);font-weight:700;font-size:13px">⭐ ${avg(l,'overall').toFixed(1)}</span>
        </div>`;
      }).join('')}
    </div>
    <div class="card">
      <h2>🔥 Hardest Lectures</h2>
      ${hardest.slice(0,5).map((l,i)=>{
        const bi = BLOCKS[l.block]||BLOCKS['Other'];
        return `<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)">
          <span style="font-family:'Playfair Display',serif;font-size:20px;font-weight:900;color:var(--accent3);width:26px">${i+1}</span>
          <div style="flex:1">
            <div style="font-weight:600;font-size:13px">${l.title}</div>
            <div style="font-size:11px;color:var(--muted)">${bi.emoji} ${l.block} · ${l.subject}</div>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <div class="diff-bar" style="width:70px"><div class="diff-fill" style="width:${(avg(l,'difficulty')/5*100).toFixed(0)}%"></div></div>
            <span style="color:var(--accent3);font-weight:700;font-size:12px">🔥${avg(l,'difficulty').toFixed(1)}</span>
          </div>
        </div>`;
      }).join('')}
    </div>
  `;
}

                </div>
                <div>
                  <label style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.7px;display:block;margin-bottom:4px">Subject</label>
                  <select id="edit-subject-${r.id}" style="font-size:12px;padding:6px 10px">
                    ${subjectOpts}
                  </select>
                </div>
              </div>
              <div style="margin-bottom:8px">
                <label style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.7px;display:block;margin-bottom:4px">Lecture Title</label>
                <input type="text" id="edit-title-${r.id}" value="${(r.lecture_title||'').replace(/"/g,'&quot;')}" style="font-size:12px;padding:6px 10px">
              </div>
              <div>
                <label style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.7px;display:block;margin-bottom:4px">Tip</label>
                <textarea id="edit-tip-${r.id}" style="width:100%;font-size:12px;min-height:60px">${r.tip||''}</textarea>
              </div>
            </div>
          </div>
          <div class="review-row-actions">
            <button class="btn-edit-save" id="edit-btn-${r.id}">✏️ Edit</button>
            <button class="btn-delete" onclick="deleteReview('${r.id}')">🗑 Delete</button>
          </div>
        </div>`).join('')
    }`;

  // Attach edit button listeners AFTER innerHTML is set — avoids inline onclick issues
  filtered.forEach(r => {
    const btn = document.getElementById(`edit-btn-${r.id}`);
    if (btn) btn.addEventListener('click', () => toggleEdit(r.id, r.block||'', r.subject||''));
  });
}

function toggleEdit(id, block, subject) {
  const viewEl = document.getElementById(`view-${id}`);
  const editEl = document.getElementById(`edit-${id}`);
  const btn    = document.getElementById(`edit-btn-${id}`);
  if (!viewEl || !editEl || !btn) return;

  const isOpen = editEl.style.display !== 'none';
  if (!isOpen) {
    viewEl.style.display = 'none';
    editEl.style.display = 'block';
    const bSel = document.getElementById(`edit-block-${id}`);
    const sSel = document.getElementById(`edit-subject-${id}`);
    if (bSel) bSel.value = block;
    if (sSel) sSel.value = subject;
    // Clone button to remove ALL existing listeners, then set fresh onclick
    const newBtn = btn.cloneNode(true);
    newBtn.textContent = '💾 Save';
    newBtn.onclick = () => saveEdit(id);
    btn.parentNode.replaceChild(newBtn, btn);
  } else {
    viewEl.style.display = 'block';
    editEl.style.display = 'none';
    const newBtn = btn.cloneNode(true);
    newBtn.textContent = '✏️ Edit';
    newBtn.onclick = () => toggleEdit(id, block, subject);
    btn.parentNode.replaceChild(newBtn, btn);
  }
}

async function saveEdit(id) {
  const reviewer = (document.getElementById(`edit-reviewer-${id}`)?.value || '').trim();
  const branch   = document.getElementById(`edit-branch-${id}`)?.value || '';
  const blockVal = document.getElementById(`edit-block-${id}`)?.value || '';
  const subject  = document.getElementById(`edit-subject-${id}`)?.value || '';
  const title    = (document.getElementById(`edit-title-${id}`)?.value || '').trim();
  const tip      = (document.getElementById(`edit-tip-${id}`)?.value || '').trim();
  const btn      = document.getElementById(`edit-btn-${id}`);

  if (!reviewer || !blockVal || !subject || !title) {
    showToast('⚠️ Reviewer, block, subject and title are required', true); return;
  }

  if (btn) { btn.textContent = '…'; btn.disabled = true; }

  try {
    const updateData = {
      reviewer:      reviewer,
      branch:        branch,
      subject:       subject,
      lecture_title: title,
      tip:           tip
    };
    // Add block separately to avoid any JS reserved word issues
    updateData['block'] = blockVal;

    const res = await fetch(`${SUPABASE_URL}/rest/v1/reviews?id=eq.${id}`, {
      method:  'PATCH',
      headers: {
        'apikey':        SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type':  'application/json',
        'Prefer':        'return=minimal'
      },
      body: JSON.stringify(updateData)
    });

    if (!res.ok) {
      const errText = await res.text();
      console.error('Save error:', res.status, errText);
      showToast(`❌ Save failed (${res.status})`, true);
      if (btn) { btn.textContent = '💾 Save'; btn.disabled = false; }
      return;
    }

    showToast('✅ Saved!');
    await renderAdminPanel();

  } catch(e) {
    console.error('Save exception:', e);
    showToast('❌ Network error saving', true);
    if (btn) { btn.textContent = '💾 Save'; btn.disabled = false; }
  }
}

async function deleteReview(id) {
  if (!confirm('Delete this review? This cannot be undone.')) return;

  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/reviews?id=eq.${id}`, {
      method:  'DELETE',
      headers: {
        'apikey':        SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type':  'application/json',
        'Prefer':        'return=minimal'
      }
    });

    if (!res.ok) {
      const errText = await res.text();
      console.error('Delete error:', res.status, errText);
      showToast(`❌ Delete failed (${res.status})`, true);
      return;
    }

    showToast('🗑 Review deleted');
    allReviews = allReviews.filter(r => r.id !== id);
    renderLectures();
    await renderAdminPanel();

  } catch(e) {
    console.error('Delete exception:', e);
    showToast('❌ Network error deleting', true);
  }
}

// ── TOAST ──
function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isError ? ' error' : '');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
